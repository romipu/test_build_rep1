name: .NET Framework 4.7.2 app

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    strategy:
      matrix:
        configuration: [Release]

    runs-on: windows-latest  # For a list of available runner types, refer to
                           # https://help.github.com/en/actions/reference/workflow-syntax-for-github-actions#jobsjob_idruns-on

    env:
      Solution_Name: src\Sol1.sln
      Test_Project_Path: src\Consol1.Tests\Consol1.Tests.csproj
      
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Add  MSBuild to the PATH: https://github.com/microsoft/setup-msbuild
    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v2

    # Restore the application to populate the obj folder with RuntimeIdentifiers
    - name: Restore the application
      run: msbuild $env:Solution_Name /t:Restore /p:Configuration=$env:Configuration
      env:
        Configuration: ${{ matrix.configuration }}

    # Build solution
    - name: Build solution
      run: msbuild $env:Solution_Name /t:Clean,Rebuild /p:Configuration=$env:Configuration
      env:
        Configuration: ${{ matrix.configuration }}

    - name: Start PostgreSQL service
      shell: powershell
      run: |
        $svc = Get-Service -Name 'postgresql*' | Select-Object -First 1
        # Set the service to manual start (so it can be started on demand) and start it
        Set-Service -InputObject $svc -StartupType Manual
        if ($svc.Status -ne 'Running') { Start-Service -InputObject $svc
        # Wait for the service to be ready
        & $env:PGBIN\pg_isready }
        Write-Host "PostgreSQL service: $($svc.Name) - $($svc.Status)"
    
    - name: Initialize PostgreSQL database
      shell: powershell
      env:
        PGPASSWORD: root
      run: |
        $env:PGBIN\psql -U postgres -c "CREATE DATABASE unit_test_db;"

        $env:PGBIN\psql -U postgres -d unit_test_db <<'EOSQL'
        CREATE ROLE "User_FULL"
          NOSUPERUSER INHERIT CREATEDB CREATEROLE NOREPLICATION;

        CREATE SCHEMA datamart AUTHORIZATION "User_FULL";
        CREATE SCHEMA appdata AUTHORIZATION "User_FULL";
        CREATE SCHEMA portalbasis AUTHORIZATION "User_FULL";
        CREATE SCHEMA portaldata AUTHORIZATION "User_FULL";
        CREATE SCHEMA ported AUTHORIZATION "User_FULL";
        CREATE SCHEMA "temp" AUTHORIZATION "User_FULL";
        CREATE SCHEMA "report" AUTHORIZATION "User_FULL";

        CREATE EXTENSION IF NOT EXISTS hstore SCHEMA public;
        CREATE EXTENSION IF NOT EXISTS dblink SCHEMA public;
        CREATE EXTENSION IF NOT EXISTS postgres_fdw SCHEMA public;
        GRANT USAGE ON FOREIGN DATA WRAPPER postgres_fdw TO "User_FULL";
        CREATE EXTENSION IF NOT EXISTS "uuid-ossp" SCHEMA public;
        CREATE EXTENSION IF NOT EXISTS postgis SCHEMA public;

        CREATE TABLE datamart.market
        (
          id bigint NOT NULL,
          name character varying(50) NOT NULL,
          description character varying(255),
          CONSTRAINT market_pkey PRIMARY KEY (id),
          CONSTRAINT market_name_key UNIQUE (name)
        );
        ALTER TABLE datamart.market OWNER TO "User_FULL";

        CREATE TABLE datamart.brand
        (
          id bigint NOT NULL,
          name character varying(50) NOT NULL,
          description character varying(255),
          CONSTRAINT brand_pkey PRIMARY KEY (id),
          CONSTRAINT brand_name_key UNIQUE (name)
        );
        ALTER TABLE datamart.brand OWNER TO "User_FULL";

        CREATE ROLE "unit_test_usr" WITH LOGIN PASSWORD '123';
        GRANT "User_FULL" TO "unit_test_usr";
        EOSQL
    
    # Run unit tests
    - name: Run unit tests
      run: dotnet test $env:Test_Project_Path --configuration $env:Configuration --logger "trx;LogFileName=test-results.trx" --no-build
      env:
        Configuration: ${{ matrix.configuration }}

    # Upload test results
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: src\Consol1.Tests\TestResults\test-results.trx
